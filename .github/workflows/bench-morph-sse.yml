name: Bench morph + SSE parity

on:
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install project dependencies
        run: npm install
      - name: Run dmax vs Datastar parity benchmark
        run: node --expose-gc tools/bench-morph-sse.js
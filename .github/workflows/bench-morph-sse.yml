name: Bench morph + SSE parity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dmax.js'
      - 'tools/bench-morph-sse.js'
      - 'tools/vendor/**'
      - '.github/workflows/bench-morph-sse.yml'
  push:
    paths:
      - 'dmax.js'
      - 'tools/bench-morph-sse.js'
      - 'tools/vendor/**'
      - '.github/workflows/bench-morph-sse.yml'

permissions:
  contents: read

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install project dependencies
        run: npm install
      - name: Run dmax vs Datastar parity benchmark
        continue-on-error: true
        run: |
          node --expose-gc --max-old-space-size=4096 tools/bench-morph-sse.js | tee bench-morph-sse.txt
      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-morph-sse-output
          path: bench-morph-sse.txt
name: Bench morph + SSE

on:
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install project dependencies
        run: npm ci
      - name: Run dmax benchmark
        run: node --expose-gc tools/bench-morph-sse.js
      - name: Run Datastar benchmark
        run: node --expose-gc tools/bench-morph-sse-datastar.js

name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install project dependencies
        run: npm install
      - name: Run notebook, e2e, headless, and fuzz tests
        run: npm test
      - name: Build minified dmax bundle
        run: npm run test:min
